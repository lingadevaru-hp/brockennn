kind = "web"
previewPath = "/"
title = "Aethelgard Wiki"
version = "1.0.0"
id = "artifacts/fictional-wiki"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26019

[services.development]
run = "pnpm --filter @workspace/fictional-wiki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fictional-wiki", "run", "build" ]
publicDir = "artifacts/fictional-wiki/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26019"
BASE_PATH = "/"
